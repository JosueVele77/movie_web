<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineStore - Iniciar Sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
<div id="stars-container"></div>
<div class="planet"></div>
<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card custom-modal p-4" style="max-width: 450px; width: 100%;">
        <div class="card-body">
            <div class="d-flex justify-content-start mb-3">
                <button class="btn btn-outline-secondary" data-action="go-back" data-fallback="../index.html">
                    <i class="bi bi-arrow-left me-2"></i>Volver
                </button>
            </div>
            <div class="text-center mb-4">
                <h2 class="fw-bold text-dark">Iniciar sesión</h2>
            </div>
            <form id="login-form" action="#" method="POST">
                <div class="mb-4">
                    <label for="username" class="form-label text-muted small fw-bold">Usuario</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent"><i class="bi bi-person text-muted"></i></span>
                        <input type="text" class="form-control" id="username" name="username" placeholder="Escribe tu usuario" autocomplete="username" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label text-muted small fw-bold">Contraseña</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent"><i class="bi bi-lock text-muted"></i></span>
                        <input type="password" class="form-control" id="password" name="password" placeholder="Escribe tu contraseña" autocomplete="current-password" required>
                    </div>
                </div>
                <div class="text-end mb-4">
                    <a href="#" class="text-muted small text-decoration-none">¿Olvidaste tu contraseña?</a>
                </div>
                <div class="d-grid mb-5">
                    <button type="submit" class="btn btn-login text-white rounded-pill py-2">INICIAR SESIÓN</button>
                </div>
                <div class="text-center mb-3">
                    <span class="text-muted small">O continúa con</span>
                </div>
                <div class="d-flex justify-content-center gap-3 mb-5">
                    <a href="#" class="btn btn-social btn-facebook text-white rounded-circle"><i class="bi bi-facebook"></i></a>
                    <a href="#" class="btn btn-social btn-x text-white rounded-circle" aria-label="Continuar con X"><i class="bi bi-twitter-x"></i></a>
                    <a href="#" class="btn btn-social btn-google text-white rounded-circle"><i class="bi bi-google"></i></a>
                </div>
                <div class="text-center mt-4 mb-2">
                    <span class="text-muted small d-block mb-1">¿No tienes cuenta?</span>
                    <a href="registro.html" class="btn border-secondary rounded-pill px-4 py-2 mt-2 w-100 fw-bold d-block text-decoration-none text-center d-flex justify-content-center align-items-center" style="border: 1px solid rgba(255, 255, 255, 0.5) !important;">Regístrate</a>
                </div>
            </form>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/script.js"></script>
</body>
</html>
