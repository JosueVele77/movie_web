<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineStore - Mis Favoritos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
<div id="stars-container"></div>
<div class="planet"></div>
<div class="container py-5">
    <div class="d-flex justify-content-start mb-3">
        <button class="btn btn-outline-light" data-action="go-back" data-fallback="../index.html">
            <i class="bi bi-arrow-left me-2"></i>Volver
        </button>
    </div>
    <h1 class="mb-4">Mis Favoritos</h1>
    <div id="favorites-grid" class="row row-cols-2 row-cols-md-3 row-cols-lg-5 g-4"></div>
</div>
<script src="../js/script.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const favorites = JSON.parse(localStorage.getItem('favorites')) || [];
        const grid = document.getElementById('favorites-grid');
        if (grid) {
            if (favorites.length === 0) {
                grid.innerHTML = '<p>No tienes películas favoritas todavía.</p>';
                return;
            }

            favorites.forEach(movie => {
                const col = document.createElement('div');
                col.className = 'col';
                const posterSrc = movie.posterPath ? `${IMG_URL}${movie.posterPath}` : FALLBACK_POSTER_URL;
                col.innerHTML = `
                        <div class="movie-card h-100 d-flex flex-column" style="cursor: pointer;" onclick="openMovieDetail(${movie.id})">
                            <img src="${posterSrc}" alt="${movie.title}" onerror="this.onerror=null;this.src='${FALLBACK_POSTER_URL}'">
                            <div class="movie-info d-flex flex-column flex-grow-1">
                                <h3 class="movie-title">${movie.title}</h3>
                            </div>
                        </div>
                    `;
                grid.appendChild(col);
            });
        }
    });
</script>
</body>
</html>
