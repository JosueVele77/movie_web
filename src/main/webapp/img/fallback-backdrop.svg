    <circle cx="220" cy="320" r="1.2"/>
    <circle cx="420" cy="420" r="1.8"/>
    <circle cx="760" cy="470" r="1.4"/>
    <circle cx="1140" cy="520" r="2"/>
    <circle cx="160" cy="560" r="1.5"/>
